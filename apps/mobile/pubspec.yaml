name: heydo
description: Heydo — trust-first gig marketplace for Kerala. Flutter app (Android + iOS).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Brand fonts bundled as assets (offline-first — no runtime font fetch).
  # Variable fonts; Flutter maps fontWeight to the wght axis.
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-VariableFont.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont.ttf
